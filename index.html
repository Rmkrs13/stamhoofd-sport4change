<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport4Change - Ticketverkoop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <img src="Sticker_TMSport.svg" alt="Sport4Change Logo" class="logo">
                <div class="header-text">
                    <h1>Sport4Change</h1>
                    <h2>Ticketverkoop</h2>
                </div>
                <button id="logoutBtn" class="logout-btn" title="Uitloggen">Uitloggen</button>
            </div>
        </header>
        
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">Totaal Tickets</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRevenue">€0</div>
                <div class="stat-label">Totale Omzet</div>
            </div>
        </div>

        <div class="filters">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Zoek op naam, telefoon, email of evenement...">
                <button id="clearSearch" class="clear-search" aria-label="Clear search">×</button>
            </div>
            <select id="productFilter">
                <option value="">Alle Evenementen</option>
            </select>
            <button id="exportBtn" class="export-btn">Exporteer</button>
        </div>

        <div class="loading" id="loading">Bestellingen laden...</div>
        
        <div class="table-container">
            <table id="ordersTable">
                <thead>
                    <tr>
                        <!-- Headers will be generated dynamically -->
                    </tr>
                </thead>
                <tbody id="ordersBody">
                </tbody>
            </table>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
