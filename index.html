<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sport4Change - Ticketverkoop</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Hide everything until auth is verified */
        body { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <img src="Sticker_TMSport.svg" alt="Sport4Change Logo" class="logo">
                <div class="header-text">
                    <h1>Sport4Change</h1>
                    <h2>Ticketverkoop</h2>
                </div>
                <button id="logoutBtn" class="logout-btn" title="Uitloggen">Uitloggen</button>
            </div>
        </header>
        
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">Totaal tickets</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRevenue">€0</div>
                <div class="stat-label">Totale omzet</div>
            </div>
        </div>

        <div class="filters">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Zoek op naam, telefoon, email of evenement...">
                <button id="clearSearch" class="clear-search" aria-label="Clear search">×</button>
            </div>
            <select id="productFilter">
                <option value="">Alle evenementen</option>
            </select>
            <button id="statsBtn" class="stats-btn" disabled>Statistieken</button>
            <button id="exportBtn" class="export-btn">Exporteer</button>
        </div>

        <div class="loading" id="loading">Bestellingen laden...</div>
        
        <div class="table-container">
            <table id="ordersTable">
                <thead>
                    <tr>
                        <!-- Headers will be generated dynamically -->
                    </tr>
                </thead>
                <tbody id="ordersBody">
                </tbody>
            </table>
        </div>

    </div>

    <!-- Statistics Modal -->
    <div id="statsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Statistieken - Alle evenementen</h2>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <div class="stats-grid">
                    <div class="chart-container">
                        <h3>Tickets per evenement</h3>
                        <canvas id="ticketsChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3>Omzet verdeling</h3>
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
                <div class="rankings-grid">
                    <div class="ranking-list">
                        <h3>Alle evenementen - Aantal tickets</h3>
                        <ol id="ticketsRanking"></ol>
                    </div>
                    <div class="ranking-list">
                        <h3>Alle evenementen - Totale omzet</h3>
                        <ol id="revenueRanking"></ol>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
