<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport4Change - Bestellingen Overzicht</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <img src="Sticker_TMSport.svg" alt="Sport4Change Logo" class="logo">
                <div class="header-text">
                    <h1>Sport4Change</h1>
                    <h2>Bestellingen Overzicht</h2>
                </div>
            </div>
        </header>
        
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">Totaal Bestellingen</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRevenue">€0</div>
                <div class="stat-label">Totale Omzet</div>
            </div>
        </div>

        <div class="filters">
            <input type="text" id="searchInput" placeholder="Zoek op naam, telefoon, email of evenement...">
            <select id="productFilter">
                <option value="">Alle Evenementen</option>
            </select>
        </div>

        <div class="loading" id="loading">Bestellingen laden...</div>
        
        <div class="table-container">
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Evenement</th>
                        <th>Naam</th>
                        <th>Aantal</th>
                        <th>Bedrag</th>
                        <th>E-mail</th>
                        <th>Telefoon</th>
                    </tr>
                </thead>
                <tbody id="ordersBody">
                </tbody>
            </table>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
