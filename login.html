<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport4Change - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-box {
            width: 100%;
            max-width: 320px;
            padding: 2rem;
        }
        
        .login-logo {
            width: 100px;
            height: 100px;
            display: block;
            margin: 0 auto 1.5rem;
        }
        
        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #333;
        }
        
        p {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        
        .password-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }
        
        .password-input {
            width: 100%;
            padding: 0.75rem;
            padding-right: 3rem;
            border: 1px solid #ddd;
            font-size: 1rem;
        }
        
        .password-input:focus {
            outline: none;
            border-color: #999;
        }
        
        .toggle-password {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.25rem;
        }
        
        .toggle-password:hover {
            color: #333;
        }
        
        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: #fa6432;
            color: white;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .login-btn:hover {
            background: #e5531f;
        }
        
        .error-message {
            color: #dc3545;
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="Sticker_TMSport.svg" alt="Sport4Change Logo" class="login-logo">
        <h1>Sport4Change</h1>
        <p>Ticketverkoop Dashboard</p>
        
        <form id="loginForm">
            <div class="password-wrapper">
                <input 
                    type="password" 
                    id="passwordInput" 
                    class="password-input" 
                    placeholder="Wachtwoord" 
                    autocomplete="current-password"
                    required>
                <button type="button" class="toggle-password" id="togglePassword">Toon</button>
            </div>
            <button type="submit" class="login-btn">Inloggen</button>
        </form>
        
        <div class="error-message" id="errorMessage">Onjuist wachtwoord</div>
    </div>

    <script>
        // Password toggle functionality
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('passwordInput');
        
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.textContent = type === 'password' ? 'Toon' : 'Verberg';
        });
        
        // Check if already logged in
        const sessionToken = localStorage.getItem('sessionToken');
        if (sessionToken) {
            // Verify token is still valid
            fetch('/api/orders', {
                headers: {
                    'Authorization': sessionToken
                }
            }).then(response => {
                if (response.ok) {
                    window.location.href = '/';
                }
            }).catch(() => {
                // Ignore errors during check
            });
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('passwordInput').value;
            const errorEl = document.getElementById('errorMessage');
            errorEl.style.display = 'none';
            
            try {
                // Try to authenticate
                const response = await fetch('/api/orders', {
                    headers: {
                        'Authorization': password
                    }
                });
                
                if (response.ok) {
                    // Save session token (password) in localStorage
                    localStorage.setItem('sessionToken', password);
                    window.location.href = '/';
                } else if (response.status === 401) {
                    errorEl.style.display = 'block';
                } else {
                    errorEl.textContent = 'Server configuratie fout';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorEl.textContent = 'Geen verbinding met server';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
